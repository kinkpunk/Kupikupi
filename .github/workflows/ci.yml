name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Validate migrations
        run: python -m alembic upgrade head --sql

  telegram-bot:
    name: Telegram Bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

  webapp:
    name: WebApp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile
            build-args: ""
          - service: telegram-bot
            context: telegram_bot
            dockerfile: telegram_bot/Dockerfile
            build-args: ""
          - service: webapp
            context: webapp
            dockerfile: webapp/Dockerfile
            build-args: |
              NEXT_PUBLIC_APP_ENV=local
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/v1
              NEXT_PUBLIC_DEMO_ACCESS_TOKEN=
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: kupikupi/${{ matrix.service }}:ci
          build-args: ${{ matrix.build-args }}
