services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kupikupi
      POSTGRES_PASSWORD: kupikupi
      POSTGRES_DB: kupikupi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kupikupi -d kupikupi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://kupikupi:kupikupi@postgres:5432/kupikupi
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

