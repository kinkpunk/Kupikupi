services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kupikupi
      POSTGRES_PASSWORD: kupikupi
      POSTGRES_DB: kupikupi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kupikupi -d kupikupi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://kupikupi:kupikupi@postgres:5432/kupikupi
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://kupikupi:kupikupi@postgres:5432/kupikupi
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build:
      context: ../telegram_bot
    env_file:
      - ../telegram_bot/.env.example
    environment:
      BACKEND_API_URL: http://backend:8000/v1
      TELEGRAM_WEBAPP_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_started

  webapp:
    build:
      context: ../webapp
    env_file:
      - ../webapp/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
